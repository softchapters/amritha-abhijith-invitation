<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abhijith & Amritha</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Alex+Brush&display=swap" rel="stylesheet">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:'Cormorant Garamond',serif;
background:#000;
}

/* PAGES */

.page{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:30px;
background:url('background.PNG') center center/cover no-repeat;
transition:1.2s ease;
}

.page::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.55);
backdrop-filter:blur(2px);
}

.page > *{
position:relative;
z-index:2;
}

.hidden{
opacity:0;
pointer-events:none;
transform:scale(1.05);
}

/* PAGE 1 */

.tagline{
font-size:1rem;
letter-spacing:4px;
text-transform:uppercase;
color:#f8edd1;
margin-bottom:30px;
animation:fadeUp 2s ease;
}

.enter-btn{
display:inline-block;
padding:10px 18px;
border:1px solid #f5e7c1;
border-radius:40px;
background:transparent;
color:#f5e7c1;
font-size:.95rem;
letter-spacing:1px;
cursor:pointer;
transition:.3s;
}

.enter-btn:hover{
transform:scale(1.05);
}

/* PAGE 2 */

.magic-text{
color:#f8edd1;
font-size:2rem;
line-height:1.8;
letter-spacing:3px;
text-transform:uppercase;
opacity:0;
filter:blur(25px);
animation:magicReveal 3s ease forwards;
}

/* PAGE 3 */

#page3{
background:#000;
}

#page3::before{
display:none;
}

.invitation-wrap{
position:relative;
width:100%;
max-width:650px;
}

.invitation-frame{
width:100%;
display:block;
}

/* LOCATION BUTTON */

.location-btn{
position:absolute;
left:50%;
transform:translateX(-50%);
top:71%;
padding:10px 22px;
border:1px solid #d4af37;
border-radius:40px;
text-decoration:none;
color:#f8edd1;
background:rgba(0,0,0,.15);
font-size:1rem;
backdrop-filter:blur(2px);
}

/* COUNTDOWN BOX */

.countdown-box{
position:absolute;
left:50%;
transform:translateX(-50%);
top:92%;
width:58%;
padding:12px;
border:1px solid rgba(212,175,55,.85);
border-radius:28px;
background:rgba(0,0,0,.15);
color:#f8edd1;
}

.countdown-title{
font-size:.95rem;
margin-bottom:6px;
}

#timer{
font-size:1.2rem;
letter-spacing:2px;
}

audio{
display:none;
}
@keyframes fadeUp{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes magicReveal{
0%{
opacity:0;
filter:blur(25px);
transform:scale(1.1);
}
50%{
opacity:.6;
filter:blur(8px);
}
100%{
opacity:1;
filter:blur(0);
transform:scale(1);
}
}
  </style>
</head>
<body>
<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>
<!-- PAGE 1 -->
<section id="page1" class="page">
<div class="tagline">
A Beautiful Moment Awaits
</div>
<button class="enter-btn" onclick="startInvitation()">
OPEN INVITATION
</button>
</section>
<!-- PAGE 2 -->
<section id="page2" class="page hidden">
<div class="magic-text">
JOIN US AS WE CELEBRATE<br>
THE ENGAGEMENT OF
</div>
</section>
<!-- PAGE 3 -->
<section id="page3" class="page hidden">
<div class="invitation-wrap">
<div class="countdown-box">
<div class="countdown-title">
Counting Down To Our Day
</div>
<div id="timer"></div>
</div>
</div>
</section>
<script>

function startInvitation(){

const music =
document.getElementById("music");

music.play().catch(()=>{});

document
.getElementById("page1")
.classList.add("hidden");

document
.getElementById("page2")
.classList.remove("hidden");

setTimeout(()=>{

document
.getElementById("page2")
.classList.add("hidden");

document
.getElementById("page3")
.classList.remove("hidden");

},5000);

}

/* Pause music when tab hidden */

document.addEventListener(
"visibilitychange",
()=>{

const music =
document.getElementById("music");

if(document.hidden){
music.pause();
}else{
music.play().catch(()=>{});
}

});

/* Countdown */

const target =
new Date(
"September 12, 2026 11:00:00"
).getTime();

setInterval(()=>{

const now =
new Date().getTime();

const diff =
target - now;

const d =
Math.floor(
diff/(1000*60*60*24)
);

const h =
Math.floor(
(diff%(1000*60*60*24))
/
(1000*60*60)
);

const m =
Math.floor(
(diff%(1000*60*60))
/
(1000*60)
);

const s =
Math.floor(
(diff%(1000*60))
/
1000
);

document
.getElementById("timer")
.innerHTML =
`${d}D : ${h}H : ${m}M : ${s}S`;

},1000);

</script>
</body>
</html>
